<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MULTISTREAM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@800&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #060810; --surface: #0a0d16; --border: rgba(99,179,237,0.12);
            --text: #a8d4f5; --accent: #63b3ed; --header: 48px;
            --mono: 'DM Mono', monospace; --display: 'Syne', sans-serif;
        }
        html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--mono); }
        body { background-image: radial-gradient(ellipse 80% 40% at 50% -10%, rgba(99,179,237,0.08) 0%, transparent 60%); }
        
        #header {
            position: fixed; top: 0; left: 0; right: 0; height: var(--header);
            background: rgba(8,10,15,0.92); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); display: flex; align-items: center;
            padding: 0 20px; z-index: 1000;
        }
        #logo { font-family: var(--display); font-weight: 800; font-size: 13px; letter-spacing: 0.18em; }

        #layout-controls { display: flex; gap: 4px; margin-left: auto; }
        .layout-btn {
            width: 30px; height: 26px; border: 1px solid var(--border); border-radius: 5px;
            background: transparent; color: rgba(99,179,237,0.35); cursor: pointer;
        }
        .layout-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(99,179,237,0.12); }

        #stage { position: fixed; top: var(--header); left: 0; right: 0; bottom: 0; display: grid; gap: 3px; padding: 3px; }
        
        .cell { position: relative; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
        
        .iframe-wrapper {
            position: absolute; top: 0; left: 0; right: 0; bottom: -50px; 
        }
        .cell iframe { width: 100%; height: 100%; border: none; }

        /* BARRE DE CONTRÔLE PERMANENTE */
        .custom-controls {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: rgba(6, 8, 16, 0.85);
            backdrop-filter: blur(10px);
            padding: 8px 12px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 30; border-top: 1px solid var(--border);
        }

        .control-group { display: flex; align-items: center; gap: 10px; }
        
        .my-btn {
            background: transparent; border: 1px solid var(--accent); color: var(--accent);
            padding: 4px 8px; border-radius: 4px; font-size: 9px; cursor: pointer;
            text-transform: uppercase; font-weight: bold;
        }
        .my-btn:hover { background: var(--accent); color: black; }

        /* STYLISATION SLIDER VOLUME */
        .volume-container { display: flex; align-items: center; gap: 8px; }
        .volume-slider {
            -webkit-appearance: none;
            width: 80px; height: 4px;
            background: rgba(99, 179, 237, 0.2);
            border-radius: 2px; outline: none;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px; height: 12px;
            background: var(--accent);
            border-radius: 50%; cursor: pointer;
            box-shadow: 0 0 10px var(--accent);
        }

        .cell-empty {
            width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
            background: rgba(99,179,237,0.02); border: none; cursor: pointer; color: var(--accent);
        }

        .modal-overlay { position: fixed; inset: 0; background: rgba(6,8,16,0.95); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .modal { width: 400px; background: #0d1220; border: 1px solid var(--accent); padding: 25px; border-radius: 12px; }
        .modal input { width: 100%; padding: 12px; background: #060810; border: 1px solid var(--border); color: white; margin: 15px 0; outline: none; }
    </style>
</head>
<body>

<header id="header">
    <div id="logo">⚓ LA PIRATERIE</div>
    <div id="layout-controls"></div>
</header>

<main id="stage"></main>

<script>
(function() {
    let count = parseInt(localStorage.getItem('ms_count')) || 4;
    let streams = JSON.parse(localStorage.getItem('ms_streams')) || Array(6).fill().map((_, i) => ({ id: i, url: '' }));

    function save() {
        localStorage.setItem('ms_count', count);
        localStorage.setItem('ms_streams', JSON.stringify(streams));
    }

    function renderControls() {
        const el = document.getElementById('layout-controls');
        el.innerHTML = '';
        [1,2,4,6].forEach(n => {
            const btn = document.createElement('button');
            btn.className = 'layout-btn' + (n === count ? ' active' : '');
            btn.textContent = n;
            btn.onclick = () => { count = n; save(); renderAll(); };
            el.appendChild(btn);
        });
    }

    function renderStage() {
        const stage = document.getElementById('stage');
        const grids = { 1: '1fr', 2: '1fr 1fr', 4: '1fr 1fr', 6: '1fr 1fr 1fr' };
        const rows = { 1: '1fr', 2: '1fr', 4: '1fr 1fr', 6: '1fr 1fr' };
        stage.style.gridTemplateColumns = grids[count];
        stage.style.gridTemplateRows = rows[count];
        stage.innerHTML = '';
        
        streams.slice(0, count).forEach((s, i) => {
            const cell = document.createElement('div');
            cell.className = 'cell';
            if (s.url) {
                cell.innerHTML = `
                    <div class="iframe-wrapper">
                        <iframe id="iframe-${i}" src="${s.url}" allow="autoplay; fullscreen"></iframe>
                    </div>
                    <div class="custom-controls">
                        <div class="control-group">
                            <button class="my-btn" onclick="togglePlay(${i})">RELOAD</button>
                            <div class="volume-container">
                                <span style="font-size:10px; color:var(--accent)">VOL</span>
                                <input type="range" class="volume-slider" min="0" max="1" step="0.1" value="1" oninput="setVolume(${i}, this.value)">
                            </div>
                        </div>
                        <div class="control-group">
                            <button class="my-btn" onclick="openModal(${i})">URL</button>
                            <button class="my-btn" onclick="goFullscreen(this.closest('.cell'))">MAX</button>
                        </div>
                    </div>
                `;
            } else {
                cell.innerHTML = `<button class="cell-empty" onclick="onclick=openModal(${i})"><span>+ AJOUTER FLUX ${i+1}</span></button>`;
            }
            stage.appendChild(cell);
        });
    }

    window.goFullscreen = (el) => {
        if (el.requestFullscreen) el.requestFullscreen();
        else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    };

    window.togglePlay = (id) => {
        const cell = document.querySelectorAll('.cell')[id];
        const iframe = cell.querySelector('iframe');
        const currentSrc = iframe.src;
        iframe.src = ''; 
        setTimeout(() => { iframe.src = currentSrc; }, 10);
    };

    // LOGIQUE DE VOLUME VIA CSS (Opacité sonore)
    // Note : Le contrôle de volume "réel" d'une iframe tiers est bloqué.
    // Mais on peut utiliser l'attribut "muted" via l'URL pour certains lecteurs.
    window.setVolume = (id, val) => {
        const iframe = document.getElementById(`iframe-${id}`);
        // Astuce visuelle : On baisse l'opacité si le son est coupé pour l'utilisateur
        if(val == 0) iframe.style.filter = "grayscale(0.5)";
        else iframe.style.filter = "none";
        
        // Comme on ne peut pas injecter de JS dans l'iframe, le slider sert ici
        // d'indicateur. Pour certains sites (Youtube/Twitch), on pourrait modifier l'URL.
        // Pour les sites de sport, la seule solution est de cliquer sur leur icône.
    };

    window.openModal = function(id) {
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.innerHTML = `
            <div class="modal">
                <p>LIEN DU FLUX</p>
                <input type="text" id="url-in" value="${streams[id].url}" placeholder="https://...">
                <div style="display:flex; gap:10px">
                    <button class="my-btn" style="flex:1" onclick="confirmUrl(${id})">VALIDER</button>
                    <button class="my-btn" style="flex:1" onclick="this.closest('.modal-overlay').remove()">FERMER</button>
                </div>
            </div>
        `;
        document.body.appendChild(overlay);
    };

    window.confirmUrl = function(id) {
        streams[id].url = document.getElementById('url-in').value.trim();
        save(); renderAll();
        document.querySelector('.modal-overlay').remove();
    };

    function renderAll() { renderControls(); renderStage(); }
    renderAll();
})();
</script>
</body>
</html>
