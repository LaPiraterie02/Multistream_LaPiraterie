<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MULTISTREAM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@800&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #060810; --surface: #0a0d16; --border: rgba(99,179,237,0.2);
            --text: #a8d4f5; --accent: #63b3ed; --header: 48px;
            --mono: 'DM Mono', monospace; --display: 'Syne', sans-serif;
        }
        html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--mono); }
        body { background-image: radial-gradient(ellipse 80% 40% at 50% -10%, rgba(99,179,237,0.08) 0%, transparent 60%); }
        
        #header {
            position: fixed; top: 0; left: 0; right: 0; height: var(--header);
            background: rgba(8,10,15,0.92); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); display: flex; align-items: center;
            padding: 0 20px; z-index: 1000;
        }
        #logo { font-family: var(--display); font-weight: 800; font-size: 13px; letter-spacing: 0.18em; }

        #layout-controls { display: flex; gap: 4px; margin-left: auto; }
        .layout-btn {
            width: 30px; height: 26px; border: 1px solid var(--border); border-radius: 5px;
            background: transparent; color: rgba(99,179,237,0.35); cursor: pointer;
        }
        .layout-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(99,179,237,0.12); }

        #stage { position: fixed; top: var(--header); left: 0; right: 0; bottom: 0; display: grid; gap: 3px; padding: 3px; }
        
        .cell { position: relative; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
        
        /* On réduit un peu le crop pour être sûr que le son ne soit pas bloqué par le navigateur */
        .iframe-wrapper {
            position: absolute; top: 0; left: 0; right: 0; bottom: 40px; 
        }
        .cell iframe { width: 100%; height: 100%; border: none; }

        /* BARRE DE CONTROLE FIXE EN BAS */
        .custom-controls {
            position: absolute; bottom: 0; left: 0; right: 0;
            height: 40px; background: #0d1220;
            border-top: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 10px; z-index: 100;
        }

        .control-group { display: flex; align-items: center; gap: 8px; }
        
        .my-btn {
            background: rgba(99,179,237,0.1); border: 1px solid var(--accent); color: var(--accent);
            padding: 3px 8px; border-radius: 4px; font-size: 9px; cursor: pointer;
            text-transform: uppercase; font-weight: bold;
        }

        /* LA BARRE DE SON */
        .volume-box { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.3); padding: 4px 8px; border-radius: 20px; }
        .volume-slider {
            -webkit-appearance: none; width: 70px; height: 4px;
            background: rgba(99,179,237,0.2); border-radius: 2px; outline: none;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 12px; height: 12px;
            background: var(--accent); border-radius: 50%; cursor: pointer;
            box-shadow: 0 0 8px var(--accent);
        }

        .cell-empty {
            width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
            background: rgba(99,179,237,0.02); border: none; cursor: pointer; color: var(--accent);
        }

        .modal-overlay { position: fixed; inset: 0; background: rgba(6,8,16,0.95); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .modal { width: 400px; background: #0d1220; border: 1px solid var(--accent); padding: 25px; border-radius: 12px; }
        .modal input { width: 100%; padding: 12px; background: #060810; border: 1px solid var(--border); color: white; margin: 15px 0; outline: none; }
    </style>
</head>
<body>

<header id="header">
    <div id="logo">⚓ LA PIRATERIE</div>
    <div id="layout-controls"></div>
</header>

<main id="stage"></main>

<script>
(function() {
    let count = parseInt(localStorage.getItem('ms_count')) || 4;
    let streams = JSON.parse(localStorage.getItem('ms_streams')) || Array(6).fill().map((_, i) => ({ id: i, url: '' }));

    function save() {
        localStorage.setItem('ms_count', count);
        localStorage.setItem('ms_streams', JSON.stringify(streams));
    }

    function renderControls() {
        const el = document.getElementById('layout-controls');
        el.innerHTML = '';
        [1,2,4,6].forEach(n => {
            const btn = document.createElement('button');
            btn.className = 'layout-btn' + (n === count ? ' active' : '');
            btn.textContent = n;
            btn.onclick = () => { count = n; save(); renderAll(); };
            el.appendChild(btn);
        });
    }

    function renderStage() {
        const stage = document.getElementById('stage');
        const grids = { 1: '1fr', 2: '1fr 1fr', 4: '1fr 1fr', 6: '1fr 1fr 1fr' };
        const rows = { 1: '1fr', 2: '1fr', 4: '1fr 1fr', 6: '1fr 1fr' };
        stage.style.gridTemplateColumns = grids[count];
        stage.style.gridTemplateRows = rows[count];
        stage.innerHTML = '';
        
        streams.slice(0, count).forEach((s, i) => {
            const cell = document.createElement('div');
            cell.className = 'cell';
            if (s.url) {
                cell.innerHTML = `
                    <div class="iframe-wrapper">
                        <iframe id="iframe-${i}" src="${s.url}" allow="autoplay; fullscreen"></iframe>
                    </div>
                    <div class="custom-controls">
                        <div class="control-group">
                            <button class="my-btn" onclick="refreshStream(${i})">RELOAD</button>
                            <div class="volume-box">
                                <span style="font-size:9px; color:var(--accent)">SON</span>
                                <input type="range" class="volume-slider" min="0" max="100" value="100" oninput="updateVol(${i}, this.value)">
                            </div>
                        </div>
                        <div class="control-group">
                            <button class="my-btn" onclick="openModal(${i})">URL</button>
                            <button class="my-btn" onclick="goFullscreen(${i})">MAX</button>
                        </div>
                    </div>
                `;
            } else {
                cell.innerHTML = `<button class="cell-empty" onclick="openModal(${i})"><span>+ AJOUTER FLUX ${i+1}</span></button>`;
            }
            stage.appendChild(cell);
        });
    }

    window.goFullscreen = (idx) => {
        const cell = document.querySelectorAll('.cell')[idx];
        if (cell.requestFullscreen) cell.requestFullscreen();
        else if (cell.webkitRequestFullscreen) cell.webkitRequestFullscreen();
    };

    window.refreshStream = (idx) => {
        const frame = document.getElementById(`iframe-${idx}`);
        const src = frame.src;
        frame.src = '';
        setTimeout(() => { frame.src = src; }, 10);
    };

    // Note : Cette fonction simule le volume car on ne peut pas forcer le volume 
    // d'un lecteur externe sans API. Elle permet surtout de couper le son visuellement.
    window.updateVol = (id, val) => {
        const iframe = document.getElementById(`iframe-${id}`);
        if(val == 0) {
            iframe.style.opacity = "0.5";
        } else {
            iframe.style.opacity = "1";
        }
    };

    window.openModal = function(id) {
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.innerHTML = `
            <div class="modal">
                <p style="font-size:12px">URL DU STREAM</p>
                <input type="text" id="url-in" value="${streams[id].url}" placeholder="https://...">
                <div style="display:flex; gap:10px">
                    <button class="my-btn" style="flex:1; padding:10px" onclick="confirmUrl(${id})">VALIDER</button>
                    <button class="my-btn" style="flex:1; padding:10px" onclick="this.closest('.modal-overlay').remove()">FERMER</button>
                </div>
            </div>
        `;
        document.body.appendChild(overlay);
    };

    window.confirmUrl = function(id) {
        streams[id].url = document.getElementById('url-in').value.trim();
        save(); renderAll();
        document.querySelector('.modal-overlay').remove();
    };

    function renderAll() { renderControls(); renderStage(); }
    renderAll();
})();
</script>
</body>
</html>
